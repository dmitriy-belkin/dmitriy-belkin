# https://github.com/lowlighter/metrics — uses repo secret GH_TOKEN (same PAT as gist workflows).
name: Metrics

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@v3.34
        with:
          filename: github-metrics.svg
          token: ${{ secrets.GH_TOKEN }}
          user: dmitriy-belkin
          template: classic
          committer_token: ${{ secrets.GITHUB_TOKEN }}

          # --- Global look & feel (aligned with README “radical” purple) ---
          config_timezone: Europe/Moscow
          config_display: large
          config_animations: yes
          config_twemoji: yes
          plugins_errors_fatal: "no"

          # Accent #BC7AF7 (matches typing SVG / radical cards)
          extras_css: |
            h1, h2, h3 {
              color: #BC7AF7 !important;
            }

          # habits/achievements/languages disabled on v3.34 (GitHub API + plugin bugs); langs live in readme-cards
          config_order: base.header, isocalendar, base.activity+community, base.repositories

          # --- Base content ---
          base: header, activity, community, repositories, metadata
          repositories_forks: yes
          repositories_affiliations: OWNER, ORGANIZATION_MEMBER, COLLABORATOR

          # --- Isometric contribution calendar ---
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Bump README metrics cache buster
        run: |
          VERSION=$(date -u +%Y%m%d%H)
          FILE='github-metrics.svg'
          if grep -q "${FILE}?v=" README.md; then
            sed -i "s|${FILE}?v=[0-9]*|${FILE}?v=${VERSION}|" README.md
          else
            sed -i "s|${FILE}\"|${FILE}?v=${VERSION}\"|" README.md
          fi

      - name: Commit cache buster
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git pull --rebase origin main
          git add README.md
          git diff --staged --quiet || git commit -m "chore: refresh metrics cache [skip ci]"
          git push
