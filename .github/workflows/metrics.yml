# https://github.com/lowlighter/metrics — uses repo secret GH_TOKEN (same PAT as gist workflows).
name: Metrics

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@v3.34
        with:
          filename: github-metrics.svg
          token: ${{ secrets.GH_TOKEN }}
          user: dmitriy-belkin
          template: classic
          committer_token: ${{ secrets.GITHUB_TOKEN }}

          # --- Global look & feel (aligned with README “radical” purple) ---
          config_timezone: Europe/Moscow
          config_display: large
          config_animations: yes
          config_twemoji: yes
          plugins_errors_fatal: "no"

          # Accent #BC7AF7 (matches typing SVG / radical cards)
          extras_css: |
            h1, h2, h3 {
              color: #BC7AF7 !important;
            }

          # achievements disabled: GitHub sunset Projects (classic) GraphQL — breaks v3.34 plugin
          config_order: base.header, isocalendar, languages, habits, base.activity+community, base.repositories

          # --- Base content ---
          base: header, activity, community, repositories, metadata
          repositories_forks: yes
          repositories_affiliations: OWNER, ORGANIZATION_MEMBER, COLLABORATOR

          # --- Languages (indepth on a few repos — GraphQL-only returned 0 for this account) ---
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          plugin_languages_other: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_colors: rainbow
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout_repositories: 8

          # --- Isometric contribution calendar ---
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # --- Coding habits (recent events) ---
          plugin_habits: yes
          plugin_habits_from: 250
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: graph
          plugin_habits_trim: yes
          plugin_habits_languages_limit: 6

      - uses: actions/checkout@v4

      - name: Bump README metrics cache buster
        run: |
          VERSION=$(date -u +%Y%m%d%H)
          FILE='github-metrics.svg'
          if grep -q "${FILE}?v=" README.md; then
            sed -i "s|${FILE}?v=[0-9]*|${FILE}?v=${VERSION}|" README.md
          else
            sed -i "s|${FILE}\"|${FILE}?v=${VERSION}\"|" README.md
          fi

      - name: Commit cache buster
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add README.md
          git diff --staged --quiet || git commit -m "chore: refresh metrics cache [skip ci]"
          git push
