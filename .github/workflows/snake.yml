# Contribution-grid snake (SVG) → branch `output`. README embeds raw SVG from there.
# https://github.com/Platane/snk
name: Generate contribution snake

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "github-metrics.svg"
      - "README.md"

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ secrets.GH_TOKEN }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Publish SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4

      - name: Bump README snake cache buster
        run: |
          VERSION=$(date -u +%Y%m%d%H)
          FILE='github-contribution-grid-snake-dark.svg'
          if grep -q "${FILE}?v=" README.md; then
            sed -i "s|${FILE}?v=[0-9]*|${FILE}?v=${VERSION}|" README.md
          else
            sed -i "s|${FILE}\"|${FILE}?v=${VERSION}\"|" README.md
          fi

      - name: Commit cache buster
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add README.md
          git diff --staged --quiet || git commit -m "chore: refresh contribution snake cache [skip ci]"
          git push
